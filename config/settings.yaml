# Story / History Shorts pipeline — central configuration
# Paths are resolved relative to repo root unless absolute.

# --- Topic input ---
topic:
  default_topic: ""                          # if empty + no CLI arg, today_in_history is used
  language: "en"
  use_wikipedia_grounding: true              # fetch Wikipedia summary to ground the LLM

# --- LLM (script writing) ---
llm:
  host: "http://localhost:11434"
  model: "llama3.2"                          # or qwen2.5:14b for richer scripts
  fallback_model: "llama3.2"
  temperature: 0.6
  max_tokens: 1500
  request_timeout_seconds: 180
  json_retries: 3

# --- Script structure ---
script:
  total_duration_seconds: 50                 # aim for under 60s
  scenes_min: 5
  scenes_max: 8
  scene_duration_seconds: 6                  # what we ask the visual provider for
  visual_style: "cinematic, dramatic lighting, photorealistic, film grain, 35mm"
  reading_speed_wpm: 155                     # used to budget script length

# --- TTS (Kokoro) ---
tts:
  voice: "af_heart"                          # see vendor/kokoro/voices.bin for full list
  speed: 1.05                                # 0.5 - 2.0
  language: "en-us"
  model_path: "vendor/kokoro/kokoro-v1.0.onnx"
  voices_path: "vendor/kokoro/voices-v1.0.bin"
  output_dir: "workspace/audio"

# --- Visual providers (cascade in order) ---
visual:
  output_resolution: [1080, 1920]            # 9:16 portrait
  aspect_ratio: "9:16"
  scene_dir: "workspace/scenes"
  providers:                                 # tried in order; first success wins
    - "wan_local"
    - "fal"
    - "kling"
    - "ltx_video"

  fal:
    enabled: true
    api_key: ""                              # from fal.ai/dashboard/keys — or set FAL_KEY in .env
    model: "bytedance/seedance-2.0/text-to-video"    # also: fal-ai/kling-video/v1.6/standard/text-to-video
    duration_seconds: 5
    resolution: "720p"                       # 480p or 720p for Seedance
    poll_interval_seconds: 5
    poll_timeout_seconds: 600

  kling:
    enabled: true
    access_key: ""                           # from app.klingai.com/global/dev
    secret_key: ""                           # ditto — both required
    model_name: "kling-v1-6"                 # also: kling-v1, kling-v1-5, kling-v2-0, kling-2-5-turbo
    mode: "std"                              # "std" (cheaper) or "pro" (higher quality)
    duration_seconds: 5                      # 5 or 10
    base_url: "https://api-singapore.klingai.com"
    poll_interval_seconds: 10
    poll_timeout_seconds: 600

  wan_local:
    enabled: true
    hf_model: "Wan-AI/Wan2.1-T2V-1.3B"       # 1.3B=fast(~3min/clip), 14B=quality(~15min/clip)
    model_dir: "vendor/wan21_mlx"
    width: 480                                 # 9:16 portrait at 480p
    height: 848
    fps: 16                                    # wan default; 16 or 24
    num_inference_steps: 30                    # lower=faster, 20-50 range
    guidance_scale: 5.0
    generate_timeout_seconds: 900              # 15 min max per clip

  ltx_video:                                  # local fallback when Kling quota is gone
    enabled: false                            # flip true after `pip install` the optional ltx deps
    model_id: "Lightricks/LTX-Video"
    num_frames: 121                           # 5s @ 24fps
    num_inference_steps: 40
    cache_dir: "vendor/hf_cache"

# --- Background music ---
music:
  source: "pixabay"                           # pixabay | silence
  pixabay_api_key: ""                         # from pixabay.com/api/docs/  (optional)
  pixabay_query_template: "{mood} cinematic instrumental"
  volume: 0.18                                # relative to narration
  output_dir: "workspace/audio"

# --- Subtitles (whisper.cpp on the TTS audio) ---
transcription:
  language: "en"
  whisper_cpp_binary: "vendor/whisper.cpp/main"
  whisper_model_path: "vendor/whisper.cpp/models/ggml-base.en.bin"
  fallback_model_path: "vendor/whisper.cpp/models/ggml-base.en.bin"

# --- Composer (FFmpeg) ---
composer:
  output_resolution: [1080, 1920]
  fps: 30
  scene_crossfade_seconds: 0.4
  subtitle_font_size: 56
  narration_volume: 1.0
  burn_subtitles: true                        # auto-skips if ffmpeg lacks libass
  workspace_dir: "workspace/clips"
  output_dir: "workspace/output"

# --- YouTube upload ---
upload:
  credentials_file: "config/youtube_credentials.json"
  client_secrets_file: "config/client_secrets.json"
  category_id: "27"                           # Education
  privacy_status: "public"
  made_for_kids: false
  tags_max: 15
  description_footer: "\n\n#Shorts #History #StoryTime"

# --- Logging ---
logging:
  log_file: "logs/runs.jsonl"
  keep_workspace_on_failure: true
  keep_workspace_on_success: false
